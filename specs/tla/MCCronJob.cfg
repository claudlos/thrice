\* Bounded model configuration for CronJob.tla / MCCronJob.tla
\* Usage: run via specs/tla/run_tlc.sh or .github/workflows/tla.yml.
\*
\* The bounds are small on purpose so TLC finishes in seconds on CI; for
\* heavier exploration raise MaxRepeat to 4 and MaxRetries to 3.

CONSTANTS
    MaxRepeat   = 2
    MaxRetries  = 2

SPECIFICATION Spec

INVARIANTS
    TypeOK
    ValidState
    RunningNotDeleted
    PausedNeverFires
    RepeatConsistency
    TerminalNoNextRun
    RunningIsEnabled
    RetryBounded
    CompletedHasRun

PROPERTIES
    RunningMakesProgress
    FailureIsRetried
    OneShotTerminates
    RemovedAbsorbs

CHECK_DEADLOCK FALSE
