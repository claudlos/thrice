\* Bounded model configuration for AgentLoop.tla / MCAgentLoop.tla
\* Usage: run via specs/tla/run_tlc.sh or .github/workflows/tla.yml.
\*
\* The bounds are small on purpose so TLC finishes in <1 min on CI.
\* For deeper sweeps raise IterationBudget to 5 and MaxRetries to 3.

CONSTANTS
    IterationBudget = 3
    MaxRetries      = 2

SPECIFICATION Spec

INVARIANTS
    TypeOK
    ValidState
    MessagesNonEmptyOnCall
    BudgetMonotonic
    RetryBounded
    RetryResetsOnResponse
    ApiParamsReadyOnCall
    SystemPromptPreserved

PROPERTIES
    Termination
    InterruptLiveness
    BudgetEventuallyFires
    TerminalStaysTerminal

CHECK_DEADLOCK FALSE
