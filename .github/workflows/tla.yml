name: TLA+ model check

on:
  push:
    branches: [main]
    paths:
      - "specs/**"
      - "modules/**state_machine*.py"
      - ".github/workflows/tla.yml"
  pull_request:
    paths:
      - "specs/**"
      - "modules/**state_machine*.py"
      - ".github/workflows/tla.yml"
  workflow_dispatch:

jobs:
  spec-coverage:
    name: TLA+ variable coverage sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run coverage check
        run: python specs/tla/_check_coverage.py

  tlc:
    name: TLC (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: spec-coverage
    strategy:
      fail-fast: false
      matrix:
        target: [cron, agent, bisector]
    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache tla2tools.jar
        uses: actions/cache@v4
        with:
          path: specs/tla/tla2tools.jar
          key: tla2tools-v1.8.0

      - name: Run TLC
        env:
          TLC_WORKERS: "2"
        run: |
          chmod +x specs/tla/run_tlc.sh
          ./specs/tla/run_tlc.sh ${{ matrix.target }}

  python-syntax:
    name: py_compile modules/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile every module
        run: |
          python -m py_compile modules/*.py modules/agent/*.py

  refinement:
    name: Python refinement tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest hypothesis
      - name: Run SM refinement tests (no Hermes required)
        env:
          HYPOTHESIS_PROFILE: ci
          PYTHONPATH: modules:.
        run: |
          pytest tests/test_cron_state_machine.py -q \
                 -k "not test_jobs and not TestCronJobs" \
                 --tb=short \
              || pytest -q tests/test_agent_loop_shadow.py tests/test_agent_loop_components.py --tb=short
